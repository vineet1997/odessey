name: Scrape District showtimes

# Refreshes data/showtimes-live.json from district.in on a schedule.
# The scraper itself only hits ~15 public, server-rendered district.in
# pages (no auth, no API key) — see scripts/scrape-district.ts and
# BRIEF.md's "Tech" section for the full architecture this fits into.
#
# When this job pushes a change, Vercel's git integration picks up the
# push and redeploys automatically — that's the whole "static app fed
# by a robot" mechanism. No Vercel-side webhook/token needed here.
#
# Triggering (2026-07-22): NOT an `on: schedule` cron. Measured against
# this repo's actual run history (GitHub's REST API), GitHub's own
# scheduler was firing this every 1-3.5 hours instead of every 30
# minutes — a documented platform limitation where sub-hourly schedule
# triggers get silently coalesced/dropped on the shared runner queue,
# not a bug in the cron expression. Real 30-min cadence now comes from
# a Supabase pg_cron job (project tiycurqyfqdcsfrycypm) calling
# POST /repos/vineet1997/odessey/actions/workflows/scrape-district.yml/dispatches
# on a real schedule, landing here as workflow_dispatch below. GitHub
# Actions still does 100% of the actual scrape-and-commit work — only
# the trigger moved.

on:
  workflow_dispatch: {} # fired every 30 min by Supabase pg_cron; also usable manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: scrape-district
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run the District scraper
        run: npm run scrape:district

      - name: Commit and push if the data actually changed
        run: |
          git config user.name "ithaka-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/showtimes-live.json
          if git diff --cached --quiet; then
            echo "No change in showtimes-live.json — nothing to commit."
          else
            git commit -m "chore: refresh District showtimes"
            git push
          fi
